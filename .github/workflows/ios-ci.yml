# ═══════════════════════════════════════════
# INWEB-iOS · Continuous Integration
# ═══════════════════════════════════════════
# Lightweight checks on Ubuntu (free tier). No macOS runner cost.
# - Project statistics
# - File presence checks
# - Banned-identifier scan
# - Balanced-brace check (catches obvious Swift syntax errors)
# ═══════════════════════════════════════════

name: 🍎 iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JOB 1 · Static checks (Ubuntu, free) ─────────────
  checks:
    name: 📝 Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📊 Project statistics
        run: |
          echo "═══════════════════════════════════════════"
          echo "  📊 INWEB-iOS Project Stats"
          echo "═══════════════════════════════════════════"
          echo ""
          swift_count=$(find INWEB -name '*.swift' 2>/dev/null | wc -l)
          swift_lines=$(find INWEB -name '*.swift' -exec cat {} + 2>/dev/null | wc -l)
          echo "  Swift files: $swift_count"
          echo "  Total lines: $swift_lines"
          echo ""
          echo "  By module:"
          for dir in INWEB/App INWEB/Core INWEB/Features INWEB/Resources INWEB/Widget; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -name '*.swift' 2>/dev/null | wc -l)
              lines=$(find "$dir" -name '*.swift' -exec cat {} + 2>/dev/null | wc -l)
              printf "    %-25s %2d files, %5d lines\n" "$dir" "$count" "$lines"
            fi
          done

      - name: 🔤 Banned identifier scan
        run: |
          echo "═══════════════════════════════════════════"
          echo "  🚫 Checking for banned identifiers"
          echo "═══════════════════════════════════════════"
          if grep -rn "com\.example" INWEB/ 2>/dev/null; then
            echo "  ❌ Found 'com.example' references — must be 'com.inweb.app'"
            exit 1
          fi
          echo "  ✅ No 'com.example' references"

          if grep -rn "LocalServerApp\|localserver" INWEB/ 2>/dev/null; then
            echo "  ❌ Found old 'LocalServerApp' references"
            exit 1
          fi
          echo "  ✅ No old naming references"

          tcount=$(grep -rE "TODO|FIXME|XXX" INWEB/ 2>/dev/null | wc -l)
          echo "  ℹ️ TODO/FIXME/XXX count: $tcount"

      - name: ⚖️  Balanced brace/paren check
        run: |
          echo "═══════════════════════════════════════════"
          echo "  ⚖️  Checking balanced braces in Swift files"
          echo "═══════════════════════════════════════════"
          failed=0
          for f in $(find INWEB -name '*.swift'); do
            open=$(grep -o '{' "$f" | wc -l)
            close=$(grep -o '}' "$f" | wc -l)
            if [ "$open" != "$close" ]; then
              echo "  ❌ $f : { ($open) vs } ($close)"
              failed=$((failed+1))
            fi
          done
          if [ $failed -eq 0 ]; then
            echo "  ✅ All Swift files have balanced braces"
          else
            echo "  ⚠️ $failed files with unbalanced braces"
            exit 1
          fi

      - name: 📄 Required files check
        run: |
          echo "═══════════════════════════════════════════"
          echo "  📄 Verifying required project files"
          echo "═══════════════════════════════════════════"
          required=(
            "INWEB/App/INWEBApp.swift"
            "INWEB/App/INWEBTheme.swift"
            "INWEB/Core/API/INWEBApi.swift"
            "INWEB/Core/Storage/Session.swift"
            "INWEB/Resources/Info.plist"
            "README.md"
            "LICENSE"
          )
          failed=0
          for f in "${required[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ MISSING: $f"
              failed=$((failed+1))
            fi
          done
          [ $failed -eq 0 ] || exit 1
