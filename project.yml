# ═══════════════════════════════════════════
# INWEB iOS · XcodeGen project spec
# ═══════════════════════════════════════════
# Generates INWEB.xcodeproj from source on-the-fly.
# No need to commit the massive Xcode project directory to git!
#
# Local usage:
#   brew install xcodegen
#   xcodegen generate
#   open INWEB.xcodeproj
#
# CI uses this automatically to build unsigned IPA.

name: INWEB
options:
  bundleIdPrefix: com.inweb
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad

targets:
  INWEB:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: INWEB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inweb.ios
        INFOPLIST_FILE: INWEB/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # No signing for unsigned CI builds
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
